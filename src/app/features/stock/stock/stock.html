<div class="stock-container">

  <div class="page-title">
    <h1>Stock Management</h1>
    <p>Manage and adjust stock levels</p>
  </div>

  <div class="search-bar">
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>Search products...</mat-label>
      <input matInput placeholder="e.g. Laptop">
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>
  </div>

  <table mat-table [dataSource]="stockData" class="stock-table">

    <ng-container matColumnDef="product">
      <th mat-header-cell *matHeaderCellDef>Product</th>
      <td mat-cell *matCellDef="let item">{{item.productName}}</td>
    </ng-container>

    <ng-container matColumnDef="warehouse">
      <th mat-header-cell *matHeaderCellDef>Warehouse</th>
      <td mat-cell *matCellDef="let item">{{item.warehouseName}}</td>
    </ng-container>

    <ng-container matColumnDef="quantity">
      <th mat-header-cell *matHeaderCellDef>Quantity</th>
      <td mat-cell *matCellDef="let item">{{item.quantity}}</td>
    </ng-container>

    <ng-container matColumnDef="threshold">
      <th mat-header-cell *matHeaderCellDef>Reorder Threshold</th>
      <td mat-cell *matCellDef="let item">{{item.reorderThreshold}}</td>
    </ng-container>

    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let item">
        <span [class]="'badge ' + item.status.toLowerCase()">
          {{item.status}}
        </span>
      </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let item">
        <button mat-icon-button color="primary"
                title="Adjust Stock"
                (click)="openAdjustDialog(item)">
          <mat-icon>edit</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>

</div>
